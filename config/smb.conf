; ============================================================
; Samba configuration file for the DACS Batch 56 file server lab
; Student: Munifa Abbas
; Environment: Ubuntu Server 22.04 LTS inside VirtualBox,
;              host machine Lenovo ThinkPad running Windows 10
; ============================================================

[global]
   workgroup = DACSLAB
   server string = DACS56-FILESERVER
   netbios name = DACS56-FS
   security = user
   map to guest = Bad User
   dns proxy = no
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   panic action = /usr/share/samba/panic-action %d

   ; SMB protocol settings, forcing SMB2/SMB3 for better security
   ; than the older SMB1 protocol
   server min protocol = SMB2
   client min protocol = SMB2

   ; performance tuning
   socket options = TCP_NODELAY IPTOS_LOWDELAY

[shared]
   comment = Shared drive for all DACS56 lab users
   path = /srv/samba/shared
   browseable = yes
   read only = no
   guest ok = no
   valid users = @sambashare
   create mask = 0664
   directory mask = 0775
   force group = sambashare

[public]
   comment = Public read only drop folder
   path = /srv/samba/public
   browseable = yes
   read only = yes
   guest ok = yes

[munifa]
   comment = Personal home share for Munifa Abbas
   path = /srv/samba/users/munifa
   browseable = no
   read only = no
   valid users = munifa
   create mask = 0600
   directory mask = 0700
